<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="Calculadora">

        <div id="screen">
        </div>

        <div class="flex">

            <div class="grid">
                <div class="card" onclick="adicionarnumero('1')">
                    <p>1</p>
                </div>
                <div class="card" onclick="adicionarnumero('2')">
                    <p>2</p>
                </div>
                <div class="card" onclick="adicionarnumero('3')">
                    <p>3</p>
                </div>
                <div class="card" onclick="adicionarnumero('4')">
                    <p>4</p>
                </div>
                <div class="card" onclick="adicionarnumero('5')">
                    <p>5</p>
                </div>
                <div class="card" onclick="adicionarnumero('6')">
                    <p>6</p>
                </div>
                <div class="card" onclick="adicionarnumero('7')">
                    <p>7</p>
                </div>
                <div class="card" onclick="adicionarnumero('8')">
                    <p>8</p>
                </div>
                <div class="card" onclick="adicionarnumero('9')">
                    <p>9</p>
                </div>
                <div class="card" onclick="adicionarnumero('0')">
                    <p>0</p>
                </div>
                <div class="card" onclick="adicionarnumero('00')">
                    <p>00</p>
                </div>
                <div class="card" onclick="adicionarnumero('.')">
                    <p>.</p>
                </div>
            </div>

            <div id="secao2">
                <div class="card" onclick="adicionaroperador('+')">
                    <p>+</p>
                </div>
                <div class="card" onclick="adicionaroperador('-')">
                    <p>-</p>
                </div>
                
                <div class="card longo" onclick="calcular()">
                    <p>=</p>
                </div>

            </div>
                        <div class="gridmenor">
                <div class="card" onclick="adicionaroperador('*')">
                    <p>X</p>
                </div>
                <div class="card" onclick="adicionaroperador('/')">
                    <p>/</p>
                </div>
                <div class="card" onclick="limpar()">
                    <p>AC</p>
                </div>
                <div class="card">
                    <p>del</p>
                </div>
            
            </div>
        </div>
    </div>

</body>
<script src="script.js"></script>

</html>
